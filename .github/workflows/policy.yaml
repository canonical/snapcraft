name: Check policy
on:
  pull_request:
  push:
    branches:
      - main
      - hotfix/*
      - work/check-policy # For development

jobs:
  policy:
    uses: canonical/starflow/.github/workflows/policy.yaml@main
  python-scans:
    name: Security scan
    uses: canonical/starflow/.github/workflows/scan-python.yaml@main
    with:
      osv-extra-args: "--config osv-scanner.toml"
      osv-exclude-paths: |
        docs
      uv-export-no-groups: |
        docs
        docs-starter-pack
