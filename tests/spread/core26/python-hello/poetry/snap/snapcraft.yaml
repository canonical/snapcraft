name: python-hello-poetry
version: "1.0"
summary: simple python application
description: build a python application using core26
base: core26
grade: stable
confinement: strict

apps:
  python-hello-poetry:
    command: bin/hello
parts:
  hello:
    plugin: poetry
    source: src
    stage-packages:
      - libpython3.14-minimal
      - libpython3.14-stdlib
      - python3-minimal # for the "python3" symlink
      - python3.14-minimal
      - python3.14-venv
