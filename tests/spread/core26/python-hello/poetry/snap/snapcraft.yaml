name: python-hello-poetry
version: "1.0"
summary: simple python application
description: build a python application using core26
base: core26
build-base: devel
grade: devel
confinement: strict

apps:
  python-hello-poetry:
    command: bin/hello
parts:
  hello:
    plugin: poetry
    source: src
    stage-packages:
      - libpython3.13-minimal
      - libpython3.13-stdlib
      - python3.13-minimal
      - python3-venv
      - python3-minimal # (for the "python3" symlink)
