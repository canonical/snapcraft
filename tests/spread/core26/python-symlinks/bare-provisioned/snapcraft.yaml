name: bare-provisioned
version: "1.0"
summary: Bare base with staged python
description: |
  If we use base bare staging python is mandatory, and the venv
  symlink must point to the staged interpreter. The expected
  symlink is python3 -> ../usr/bin/<staged interpreter>.

grade: devel
base: bare
# update once core26 is stable (#6088)
build-base: core24
confinement: strict

apps:
  hello:
    command: bin/hello

parts:
  python-sample:
    plugin: python
    source: src
    python-packages: [black]
    stage-packages:
      - libpython3.14-minimal
      - libpython3.14-stdlib
      - python3-minimal # for the "python3" symlink
      - python3.14-minimal
      - python3.14-venv
