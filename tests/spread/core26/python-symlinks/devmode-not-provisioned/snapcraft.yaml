name: devmode-not-provisioned
version: "1.0"
summary: Devmode confinement without staged python
description: The core26 base doesn't include Python, so the build must fail.

grade: devel
base: core26
build-base: devel
confinement: devmode

apps:
  hello:
    command: bin/hello

parts:
  python-sample:
    plugin: python
    source: src
    python-packages: [black]
