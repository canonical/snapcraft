name: strict-provisioned
version: "1.0"
summary: Strict confinement with staged python
description: |
  When confinement is strict and python is staged, the venv
  symlink must point to the staged interpreter. The expected
  symlink is python3 -> ../usr/bin/<staged interpreter>.

grade: devel
base: core26
build-base: devel
confinement: strict

apps:
  hello:
    command: bin/hello

parts:
  python-sample:
    plugin: python
    source: src
    python-packages: [black]
    stage-packages:
      - libpython3.14-minimal
      - libpython3.14-stdlib
      - python3-minimal # for the "python3" symlink
      - python3.14-minimal
      - python3.14-venv
