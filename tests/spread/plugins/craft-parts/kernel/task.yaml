summary: Craft Parts kernel plugin test
manual: true
kill-timeout: 180m

systems:
  - ubuntu-22.04
  - ubuntu-22.04-64
  - ubuntu-22.04-amd64
  - ubuntu-22.04-arm64

environment:
  SNAPCRAFT_ENABLE_EXPERIMENTAL_PLUGINS: 1

restore: |
  snapcraft clean
  rm -rf ./*.snap squashfs-root/

execute: |
  # Unset SNAPCRAFT_BUILD_ENVIRONMENT=host.
  unset SNAPCRAFT_BUILD_ENVIRONMENT

  rm -f ./*.snap
  snapcraft pack
  ls -l pc-kernel_*.snap

  unsquashfs pc-kernel_*.snap

  for file in usr/local/sbin/bpftool usr/bin/cpupower bin/perf; do
    [ -x "squashfs-root/${file}" ] || exit 1
  done
