name: pc-kernel
summary: Initrd plugin test
description: A pc kernel to test the initrd plugin.

grade: stable
build-base: core22
confinement: strict
type: kernel
adopt-info: kernel

parts:
  kernel:
    plugin: kernel
    kernel-ubuntu-binary-package: true
    stage-packages:
      - wireless-regdb
    override-build: |
      craftctl default

      kver="$(basename "${CRAFT_PART_INSTALL}/lib/modules/"*)"

      craftctl set version="${kver}"
    prime:
      - -kernel.img*

  initrd:
    after: [kernel]
    plugin: initrd
    initrd-build-efi-image: true
    initrd-firmware:
      - firmware/regulatory.db
      - firmware/regulatory.db.p7s
