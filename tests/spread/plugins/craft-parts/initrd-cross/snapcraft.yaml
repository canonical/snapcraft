name: nezha-kernel
summary: Initrd plugin cross-building test
description: A RISC-V kernel to test the initrd plugin.

grade: stable
build-base: core22
confinement: strict
type: kernel
adopt-info: kernel

architectures:
  - build-on: [amd64]
    build-for: [riscv64]

package-repositories:
  - type: apt
    components: [main]
    architectures: [$CRAFT_ARCH_BUILD_FOR]
    suites: [jammy]
    key-id: F6ECB3762474EDA9D21B7022871920D1991BC93C
    url: http://ports.ubuntu.com/ubuntu-ports

parts:
  kernel:
    plugin: kernel
    kernel-ubuntu-binary-package: true
    stage-packages:
      - wireless-regdb
    override-build: |
      craftctl default

      kver="$(basename "${CRAFT_PART_INSTALL}/lib/modules/"*)"

      craftctl set version="${kver}"

  initrd:
    after: [kernel]
    plugin: initrd
    initrd-modules: [8723ds, nls_iso8859-1, sunxi-mmc]
