name: nezha-kernel
summary: Initrd plugin cross-building test
description: A RISC-V kernel to test the initrd plugin.

grade: stable
build-base: core22
confinement: strict
type: kernel
adopt-info: kernel

architectures:
  - build-on: [amd64]
    build-for: [riscv64]

parts:
  kernel:
    plugin: kernel
    kernel-ubuntu-binary-package: true
    kernel-ubuntu-abinumber: 6.8.0-63
    kernel-ubuntu-kconfigflavour: generic
    stage-packages:
      - wireless-regdb
    override-build: |
      craftctl default

      kver="$(basename "${CRAFT_PART_INSTALL}/lib/modules/"*)"

      craftctl set version="${kver}"

  initrd:
    after: [kernel]
    plugin: initrd
    initrd-modules: [8723ds, nls_iso8859-1, sunxi-mmc]
