summary: Craft Parts initrd plugin cross-build test
manual: true
kill-timeout: 180m

systems:
  - ubuntu-22.04
  - ubuntu-22.04-64
  - ubuntu-22.04-amd64

environment:
  SNAPCRAFT_ENABLE_EXPERIMENTAL_PLUGINS: 1

restore: |
  snapcraft clean
  rm -f ./*.snap

execute: |
  # Unset SNAPCRAFT_BUILD_ENVIRONMENT=host.
  unset SNAPCRAFT_BUILD_ENVIRONMENT


  # Fixup for cross-compiling, required on Jammy and earlier
  { echo 'Types: deb'; \
    echo 'URIs: http://ports.ubuntu.com/ubuntu-ports'; \
    echo 'Suites: jammy jammy-updates jammy-backports'; \
    echo 'Components: main universe restricted multiverse'; \
    echo 'Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg'; \
    echo 'Architectures: riscv64'; } >> /etc/apt/sources.list.d/cross.sources

  sed -i 's/deb h/deb [arch=amd64] h/' /etc/apt/sources.list
  dpkg --add-architecture riscv64

  apt update
  apt install --yes libc6-riscv64-cross

  ln -sf /usr/riscv64-linux-gnu/lib/ld-linux-riscv64-lp64d.so.1 /lib

  rm -f ./*.snap
  snapcraft pack
  ls -l nezha-kernel_*_riscv64.snap
