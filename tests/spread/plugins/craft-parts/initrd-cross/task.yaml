summary: Craft Parts initrd plugin cross-build test
manual: true
kill-timeout: 180m

systems:
  - ubuntu-22.04
  - ubuntu-22.04-64
  - ubuntu-22.04-amd64

restore: |
  snapcraft clean
  rm -rf ./*.snap squashfs-root/

execute: |
  # Unset SNAPCRAFT_BUILD_ENVIRONMENT=host.
  unset SNAPCRAFT_BUILD_ENVIRONMENT

  rm -f ./*.snap
  snapcraft pack
  ls -l nezha-kernel_*_riscv64.snap

  unsquashfs nezha-kernel_*.snap

  # snapd-info is a "required" file; we should make sure it's present.
  [ -e squashfs-root/snapd-info ] || exit 1
