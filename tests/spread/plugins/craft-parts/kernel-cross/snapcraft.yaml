name: nezha-kernel
summary: Kernel plugin cross-building test
description: A RISC-V kernel to test the kernel plugin.

grade: stable
build-base: core24
confinement: strict
type: kernel
adopt-info: kernel

platforms:
  cross:
    build-on: [amd64]
    build-for: [riscv64]

package-repositories:
  - type: apt
    architectures: [$CRAFT_ARCH_BUILD_FOR]
    formats: [deb]
    components: [main]
    suites: [noble, noble-updates, noble-backports]
    key-id: F6ECB3762474EDA9D21B7022871920D1991BC93C
    url: http://ports.ubuntu.com/ubuntu-ports

parts:
  kernel:
    plugin: kernel
    source: https://git.launchpad.net/~canonical-kernel/ubuntu/+source/linux-riscv/+git/noble
    source-depth: 1
    source-type: git
    source-tag: Ubuntu-riscv-6.17-6.17.0-29.29.1_24.04.1
    kernel-ubuntu-kconfigflavour: riscv
    kernel-ubuntu-abinumber: Ubuntu-riscv-6.17-6.17.0-29.29.1_24.04.1
    kernel-tools: [bpftool, cpupower]
    kernel-kdefconfig: [defconfig, test.config]
    kernel-kconfigs:
      - CONFIG_WLAN=y
      - CONFIG_MAC80211=y
      - CONFIG_RTW88=y
      - CONFIG_RTW88_SDIO=m
      - CONFIG_RTW88_8723D=m
      - CONFIG_RTW88_8723DS=m
      # pahole required, but this is just a test
      - CONFIG_DEBUG_INFO_BTF=n
    stage-packages:
      - wireless-regdb
    override-pull: |
      craftctl default

      cp -f "${CRAFT_PROJECT_DIR}/test_defconfig" "${CRAFT_PART_SRC}/kernel/configs/test.config"

      # cpupower won't cross-compile without some massaging - this is fixed in later kernel releases
      sed -i 's/^CROSS\s*=\s*#.*/CROSS ?=/' "${CRAFT_PART_SRC}/tools/power/cpupower/Makefile"
    override-build: |
      craftctl default

      kver="$(basename "${CRAFT_PART_INSTALL}/lib/modules/"*)"

      # Set the version of the snap to match the kernel version.
      craftctl set version="$kver"
    organize:
      dtbs/allwinner: dtbs/
