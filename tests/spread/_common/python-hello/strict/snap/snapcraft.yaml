name: python-hello-strict
version: "1.0"
summary: simple python application
description: build a python application using core26
base: core26
build-base: devel
grade: devel
confinement: strict

apps:
  python-hello-strict:
    command: bin/python $SNAP/bin/hello
parts:
  hello:
    plugin: python
    source: src
    python-packages:
      - black
    stage-packages:
      - libpython3.14-minimal
      - libpython3.14-stdlib
      - python3-minimal # for the "python3" symlink
      - python3.14-minimal
      - python3.14-venv
