name: python-hello-uv
version: "1.0"
summary: simple python application
description: build a python application using core26
base: core26
build-base: devel
grade: devel
confinement: strict

apps:
  python-hello-uv:
    command: bin/python $SNAP/bin/hello
parts:
  hello:
    plugin: uv
    source: src
    build-snaps:
      - astral-uv
    stage-packages:
      - libpython3.14-minimal
      - libpython3.14-stdlib
      - python3-minimal # for the "python3" symlink
      - python3.14-minimal
      - python3.14-venv
