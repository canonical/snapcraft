summary: Build and run Python-based snaps in core26

environment:
  PARAM/strict: ""
  PARAM/classic: "--classic"
  PARAM/poetry: ""
  PARAM/uv: ""

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "./${SPREAD_VARIANT}/snap/snapcraft.yaml"

execute: |
  cp -r src ./"${SPREAD_VARIANT}"/
  cd ./"${SPREAD_VARIANT}"

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"

  snapcraft pack

  # shellcheck disable=SC2086
  snap install python-hello-"${SPREAD_VARIANT}"_1.0_*.snap --dangerous ${PARAM}

  python-hello-"${SPREAD_VARIANT}" | MATCH "hello world! black version"

restore: |
  cd ./"${SPREAD_VARIANT}"
  snapcraft clean
  rm -f ./*.snap
  snap remove "python-hello-${SPREAD_VARIANT}" --purge

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snap/snapcraft.yaml"
