summary: Build a simple snap

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"

  # remove when core26 is stable (#6088)
  if [[ "$base" == "core26" ]]; then
    base="devel"
  fi

  sed -i "s/^build-base: .*/build-base: $base/" snapcraft.yaml

execute: |
  snapcraft pack
  snap install core2x_*.snap --dangerous

  # verify that the chisel packages made it to the base
  [ -d /snap/core2x/current/bin ] || exit 1
  [ -d /snap/core2x/current/lib ] || exit 1
  [ -d /snap/core2x/current/var ] || exit 1

restore: |
  snapcraft clean
  rm -f ./*.snap

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snapcraft.yaml"
