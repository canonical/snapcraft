name: poetry-hello
version: "1.0"
summary: simple python application
description: build a python application
base: core24
confinement: strict

apps:
  poetry-hello:
    command: bin/python $SNAP/bin/hello

parts:
  python-runtime:
    plugin: nil
    stage-packages:
      - libpython3.14-minimal
      - libpython3.14-stdlib
      - python3-minimal # for the "python3" symlink
      - python3.14-minimal
      - python3.14-venv

  hello:
    after: [python-runtime]
    plugin: poetry
    source: src
