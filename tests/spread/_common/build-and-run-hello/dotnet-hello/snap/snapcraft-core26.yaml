name: dotnet-hello
base: core26
version: '1.0'
summary: a simple dotnet snap
description: a simple dotnet snap

confinement: strict

apps:
  dotnet-hello:
    command: HelloWorld

parts:
  hello:
    plugin: dotnet
    source: src
    dotnet-version: "8.0"
    dotnet-self-contained: true
    dotnet-configuration: Release
    stage-packages: [ libicu78 ]
