name: uv-hello
version: "1.0"
summary: simple python application
description: build a python application using core24
base: core24
confinement: strict

apps:
  uv-hello:
    command: bin/python3 $SNAP/bin/hello

parts:
  python-runtime:
    plugin: nil
    stage-packages:
      - libpython3.14-minimal
      - libpython3.14-stdlib
      - python3-minimal # for the "python3" symlink
      - python3.14-minimal
      - python3.14-venv

  hello:
    after: [python-runtime]
    plugin: uv
    source: src
    build-snaps:
      - astral-uv
