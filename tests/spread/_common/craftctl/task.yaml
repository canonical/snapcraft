summary: Test craftctl commands

environment:
  SNAP/test_craftctl_default: test-craftctl-default
  SNAP/test_craftctl_get_set: test-craftctl-get-set
  SNAP/test_snapcraftctl_compat: test-craftctl-snapcraftctl-compat

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "$SNAP/snap/snapcraft.yaml"

execute: |
  cd "$SNAP"

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"

  # core26 and higher bases don't support snapcraftctl
  if [[ "$base" == "core26" && "$SNAP" == "test-craftctl-snapcraftctl-compat" ]]; then
    snapcraft pack 2>&1 | MATCH "can't use 'snapcraftctl'"
    exit 0
  fi

  snapcraft pack

  snap install craftctl-*.snap --dangerous

  TESTBIN="${SNAP##*test-}"
  $TESTBIN | grep hello

restore: |
  cd "$SNAP"
  rm -f ./*.snap

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"

  # core26 and higher bases don't support snapcraftctl
  if [[ "$base" == "core26" && "$SNAP" == "test-craftctl-snapcraftctl-compat" ]]; then
    snapcraft clean 2>&1 | MATCH "can't use 'snapcraftctl'"
  else
    snapcraft clean
  fi


  restore_yaml "snap/snapcraft.yaml"
