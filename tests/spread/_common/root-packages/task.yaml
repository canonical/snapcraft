summary: Test build-snaps and build-packages at the root

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "snapcraft.yaml"

execute: |
  # root build-packages and build-snaps are added to an implicit part named `snapcraft/core`
  # verification happens in the override-build script
  snapcraft pack

restore: |
  snapcraft clean
  rm -f ./*.snap

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snapcraft.yaml"
