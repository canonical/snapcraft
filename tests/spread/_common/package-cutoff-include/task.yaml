summary: Test staging packages that included in the base

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "snapcraft.yaml"

execute: |
  snapcraft prime --destructive-mode

  # delete me if the test passes
  ls -l prime/usr/lib/x86_64-linux-gnu/

  test -e prime/usr/lib/x86_64-linux-gnu/libz.so.1
  test -e prime/usr/lib/x86_64-linux-gnu/libzstd.so.1

  # Staging zlib1g and libzstd1 should stage libc, even though
  # it's already in the base snap
  test -e prime/usr/lib/x86_64-linux-gnu/libc.so.6

restore: |
  snapcraft clean --destructive-mode

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snapcraft.yaml"
