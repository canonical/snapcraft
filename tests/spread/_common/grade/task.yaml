summary: Set the grade of a snap

environment:
  SNAP_GRADE/stable: stable
  SNAP_GRADE/devel: devel

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_grade "snapcraft.yaml" "${SNAP_GRADE}"
  set_base "snapcraft.yaml"

execute: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"

  # drop this conditional when core26 is stable (#6088)
  if [[ "$base" == "core26" && "$SPREAD_VARIANT" == "stable" ]]; then
    snapcraft prime --destructive-mode 2>&1 | MATCH "Setting grade to 'devel' because build_base is 'devel'"
    exit 0
  else
    snapcraft prime --destructive-mode
  fi

  grep -q "grade: ${SNAP_GRADE}" prime/meta/snap.yaml

restore: |
  snapcraft clean --destructive-mode

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snapcraft.yaml"
