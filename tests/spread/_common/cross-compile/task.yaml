summary: Cross-compile a snap with build-packages and stage-packages from a foreign architecture.

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "snapcraft.yaml"

  # set the correct package repositories
  base="$(get_base)"
  case "$base" in
    core26) suites="resolute" ;;
    core24) suites="noble, noble-updates, noble-backports" ;;
    core22) suites="jammy, jammy-updates, jammy-backports" ;;
  esac
  sed -i "s/SUITES-PLACEHOLDER/$suites/" snapcraft.yaml

execute: |
  snapcraft pack

  unsquashfs curl-consumer_1.0_riscv64.snap

  # check that the binary is compiled for riscv64
  readelf -h squashfs-root/usr/bin/curl-consumer | grep "Machine" | MATCH "RISC-V"

restore: |
  snapcraft clean
  rm -f ./*.snap
  rm -rf ./squashfs-root

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snapcraft.yaml"
