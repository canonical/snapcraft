summary: Test various package-repository configurations

environment:
  SNAP/test_apt_key_fingerprint: test-apt-key-fingerprint
  SNAP/test_apt_key_name: test-apt-key-name
  SNAP/test_apt_keyserver: test-apt-keyserver
  SNAP/test_apt_ppa: test-apt-ppa
  SNAP/test_pin: test-pin
  SNAP/test_multi_keys: test-multi-keys
  SNAP/test_foreign_armhf: test-foreign-armhf
  SNAP/test_foreign_i386: test-foreign-i386
  SNAP/test_key_conflict: test-key-conflict

prepare: |
  # Remove the currently installed "gpg" and "dirmngr" packages to ensure that
  # Snapcraft itself is installing them when necessary.
  sudo dpkg --remove --force-depends gpg dirmngr

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  if [ -f "${SNAP}/snap/snapcraft.yaml" ]; then
    yaml_path="${SNAP}/snap/snapcraft.yaml"
  else
    yaml_path="${SNAP}/snapcraft.yaml"
  fi
  set_base "$yaml_path"

  base="$(get_base)"
  case "$base" in
    core26) suites="resolute" ;;
    core24) suites="noble" ;;
    core22) suites="jammy" ;;
  esac
  sed -i "s/SUITES-PLACEHOLDER/$suites/" "$yaml_path"

  case "$base" in
    core26) ports_suites="resolute" ;;
    core24) ports_suites="noble, noble-security, noble-updates" ;;
    core22) ports_suites="jammy, jammy-security, jammy-updates" ;;
  esac
  sed -i "s/PORTS-SUITES-PLACEHOLDER/$ports_suites/" "$yaml_path"

  case "$base" in
    core26) deadsnakes_suites="resolute" ;;
    core24) deadsnakes_suites="noble" ;;
    core22) deadsnakes_suites="jammy" ;;
  esac
  sed -i "s/DEADSNAKES-SUITES-PLACEHOLDER/$deadsnakes_suites/" "$yaml_path"

execute: |
  cd "$SNAP"

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"

  # drop this section when core26 is stable (#6088)
  if [[ "$base" == "core26" ]] && ! snap list core26 >/dev/null 2>&1; then
    snap install core26 --channel=edge
  fi

  # drop this section when deadsnakes has a resolute suite (#6088)
  if [[ "$base" == "core26" && "$SNAP" == "test-foreign-armhf" ]]; then
    # todo: add the right error text to do a 'snapcraft pack | MATCH ""'
    snapcraft pack
    exit 0
  fi

  # Build what we have.
  snapcraft pack

  # And verify the snap runs as expected.
  snap install "${SNAP}"_1.0_*.snap --dangerous
  # Exclamation mark is not allowed in command, so do a
  # more relaxed match
  "${SNAP}" | MATCH hello

  snap remove "${SNAP}"
  rm -f ./*.snap

  # Also build in destructive mode.
  snapcraft pack --destructive-mode

  # And verify the snap runs as expected.
  snap install "${SNAP}"_1.0_*.snap --dangerous
  # Exclamation mark is not allowed in command, so do a
  # more relaxed match
  "${SNAP}" | MATCH hello

restore: |
  sudo apt install -y gpg dirmngr

  cd "$SNAP"
  rm -f ./*.snap
  # The regular clean can potentially fail depending on if/when the test itself failed, but
  # they should always both be attempted
  snapcraft clean || true
  snapcraft clean --destructive-mode
  snap remove "${SNAP}"

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  if [ -f "snap/snapcraft.yaml" ]; then
    restore_yaml "snap/snapcraft.yaml"
  else
    restore_yaml "snapcraft.yaml"
  fi
