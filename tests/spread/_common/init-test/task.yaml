summary: Init and execute tests

environment:
  CI: "1"

prepare: |
  mkdir test-snap
  cd test-snap

  snapcraft init
  snapcraft init --profile=test

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "snap/snapcraft.yaml"

execute: |
  cd test-snap

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"

  # 'snapcraft test' fails because there isn't a stable core26 snap to install in the test env
  # drop this conditional when core26 is stable (#6088)
  if [[ "$base" == "core26" ]]; then
    exit 0
  fi

  systemctl unmask unattended-upgrades.service
  snapcraft test
  systemctl is-enabled unattended-upgrades.service | MATCH masked

restore: |
  cd test-snap

  snapcraft clean

  rm -rf test-snap
  rm -rf ./*.snap
