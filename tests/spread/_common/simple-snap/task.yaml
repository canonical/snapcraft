summary: Pack a simple snap

prepare: |
  cd "./snap"

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "snapcraft.yaml"

execute: |
  cd "./snap"

  snapcraft pack

  # drop this section when core26 is stable (#6088)
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"
  if [[ "$base" == "core26" ]] && ! snap list core26 >/dev/null 2>&1; then
    snap install core26 --channel=edge
  fi

  snap install --dangerous ./*.snap
  /snap/bin/simple-snap.hello

restore: |
  cd "./snap"

  snap remove --purge simple-snap
  snapcraft clean
  rm -f ./*.snap

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snapcraft.yaml"
