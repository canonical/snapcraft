name: paths-user-defined
version: "1"
summary: test
description: Defining LD_LIBRARY_PATH or PATH should override default values.
grade: devel
confinement: strict
base: core24

apps:
  paths-user-defined:
    command: usr/bin/hello

parts:
  hello:
    plugin: nil
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      echo "#! /bin/sh\n" > $CRAFT_PART_INSTALL/usr/bin/hello
      chmod +x $CRAFT_PART_INSTALL/usr/bin/hello
      craftctl default

environment:
  LD_LIBRARY_PATH: test-1
  PATH: test-2
  TEST_VARIABLE: test-3
