name: paths-one-null
version: "1"
summary: test
description: |
  Setting either LD_LIBRARY_PATH or PATH to null should
  cause that variable to be excluded, while other
  variables are still handled.
grade: devel
confinement: strict
base: core24

apps:
  paths-one-null:
    command: usr/bin/hello

parts:
  hello:
    plugin: nil
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      echo "#! /bin/sh\n" > $CRAFT_PART_INSTALL/usr/bin/hello
      chmod +x $CRAFT_PART_INSTALL/usr/bin/hello
      craftctl default

environment:
  LD_LIBRARY_PATH: null
  PATH: $SNAP/usr/sbin:$SNAP/usr/bin:$SNAP/sbin:$SNAP/bin:$PATH
  TEST_VARIABLE: test-1
