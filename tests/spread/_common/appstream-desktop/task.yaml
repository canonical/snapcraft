summary: Appstream desktop file test

environment:
  SNAP/desktop: desktop
  SNAP/icon_desktop: icon-desktop

# This test snap is limited to amd64 arch due to architectures specified
# in expected_snap.yaml.
# systems:
#   - ubuntu-22.04-64
#   - ubuntu-22.04-amd64
#   - ubuntu-24.04-64
#   - ubuntu-24.04-amd64

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "${SNAP}/snap/snapcraft.yaml"

execute: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  base="$(get_base)"

  cd "${SNAP}"

  snapcraft pack

  # assert snap contents
  unsquashfs -dest "snap-contents" "appstream-desktop.*.snap"

  if ! diff -U10 snap-contents/meta/snap.yaml "expected-$base-snap.yaml"; then
      echo "The formatting for snap.yaml is incorrect"
      exit 1
  fi

  if ! diff -U10 snap-contents/meta/gui/appstream-desktop.desktop expected-appstream-desktop.desktop; then
      echo "The formatting for appstream-desktop.desktop is incorrect"
      exit 1
  fi

restore: |
  cd "${SNAP}"

  snapcraft clean
  rm -f ./*.snap
  rm -rf ./snap-contents

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snap/snapcraft.yaml"
