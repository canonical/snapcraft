name: python-hello-strict
version: "1.0"
summary: simple python application
description: build a python application using core24
base: core24
confinement: strict

apps:
  python-hello-strict:
    command: bin/hello
parts:
  hello:
    plugin: python
    source: src
    python-packages:
      # patchelf silently fails to patch .so's in black 26.5.0 (NixOS/patchelf#583)
      - black==26.3.1
