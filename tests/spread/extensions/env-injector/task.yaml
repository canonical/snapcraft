summary: Build and run a basic hello-world snap using extensions

systems:
  - ubuntu-24.04

environment:

  SNAPCRAFT_ENABLE_EXPERIMENTAL_EXTENSIONS: "1"
  SNAP_DIR: ../snaps/env-injector-hello
  SNAP: env-injector-hello

prepare: |

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "$SNAP_DIR/snap/snapcraft.yaml"

restore: |

  cd "$SNAP_DIR"
  snapcraft clean
  rm -f ./*.snap
  rm -rf ./squashfs-root
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snap/snapcraft.yaml"

execute: |

  cd "$SNAP_DIR"
  snapcraft

  unsquashfs "${SNAP}"_1.0_*.snap

  # Check that the env-exporter program is present
  [ -f squashfs-root/bin/command-chain/env-exporter ]
  
  # Check that the hello command is present
  [ -f squashfs-root/usr/local/bin/hello ]

  snap install "${SNAP}"_1.0_*.snap --dangerous

  # Create global envfile
  echo 'HELLO_WORLD=Hello World' >> envfile.env

  # Create app-specific envfile
  echo 'SCOPED=Scoped' >> appenv.env

  # Set env vars: Global
  snap set env-injector-hello env.global="World"

  # Set env vars: specific to each app
  snap set env-injector-hello apps.hello1.env.hello="Hello"
  snap set env-injector-hello apps.hello2.env.specific="City"

  # To Check if key with dot will be rejected 
  snap set env-injector-hello env.word.dot="wrong"

  # To test order of env vars
  echo 'ORDER="From envfile"' >> envfile.env
  snap set env-injector-hello apps.hello1.env.order="from app-specific"

  # Load global and app-specific envfiles
  snap set env-injector-hello envfile="${SNAP_DIR}"/envfile.env
  snap set env-injector-hello apps.hello1.envfile="${SNAP_DIR}"/appenv.env

  # Run the hello command
  # These will fail if the env vars are not set as expected
  env-injector-hello.hello1
  env-injector-hello.hello2

  # Make sure that alias is NOT rewritten
  snap set env-injector-hello apps.myapp.env.specific="City"
  env-injector-hello.hello-demo
