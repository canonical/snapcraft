summary: Build and run a basic GPU snap using extensions

# The content snap required for the test to succeed is only
# available on a subset of all the architectures this testbed
# can run on.
systems:
  - ubuntu-22.04
  - ubuntu-22.04-64
  - ubuntu-22.04-amd64
  - ubuntu-24.04
  - ubuntu-24.04-64
  - ubuntu-24.04-amd64
  - ubuntu-26.04
  - ubuntu-26.04-64
  - ubuntu-26.04-amd64

environment:
  SNAP_DIR: ../snaps/gpu-hello

prepare: |
  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  set_base "$SNAP_DIR/snap/snapcraft.yaml"

  # TODO: Remove this once core26 is stable
  if [[ "$SPREAD_SYSTEM" =~ ubuntu-26.04 ]]; then
    snap install core26 --edge
    snap install mesa-2604 --edge
  fi

restore: |
  cd "$SNAP_DIR"
  snapcraft clean
  rm -f ./*.snap

  #shellcheck source=tests/spread/tools/snapcraft-yaml.sh
  . "$TOOLS_DIR/snapcraft-yaml.sh"
  restore_yaml "snap/snapcraft.yaml"

execute: |
  cd "$SNAP_DIR"

  snapcraft pack | NOMATCH "GPU support library should be provided by a content interface"

  snap install gpu-hello_*.snap --dangerous

  # TODO: Remove this once mesa-2604 is autoconnected
  [[ "$SPREAD_SYSTEM" =~ ubuntu-26.04 ]] && snap connect gpu-hello:gpu-2604 mesa-2604:gpu-2604

  gpu-hello.gpuinfo
