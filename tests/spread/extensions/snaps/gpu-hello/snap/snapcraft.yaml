name: gpu-hello
version: "1.0"
summary: test the gpu extension
description: This is a basic gpu snap

grade: devel
base: core24
confinement: strict

apps:
  gpuinfo:
    command: usr/local/bin/gpuinfo
    extensions: [gpu]

parts:
  project:
    source: .
    plugin: nil
    build-packages:
    - gcc
    - libc6-dev
    - libegl-dev
    - libgl-dev
    - libgles2-mesa-dev
    override-build: |
      gcc -std=c11 -O2 -Wall -Wextra -pedantic \
        "gpuinfo.c" \
        -o "gpuinfo" \
        -lEGL -lGL -lGLESv2
      install -D -m755 "gpuinfo" "${CRAFT_PART_INSTALL}/usr/local/bin/gpuinfo"

  cleanup:
    after: [project]
    source: https://github.com/canonical/gpu-snap.git
    plugin: nil
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/%GPU_INTERFACE%-cleanup %MESA_SNAP%
      # Workaround for https://bugs.launchpad.net/snapd/+bug/2055273
      mkdir -p "${CRAFT_PRIME}/%GPU_INTERFACE%"
