summary: Init and execute tests

environment:
  CI: "1"

prepare: |
  rm -rf test-snap

restore: |
  rm -rf test-snap
  rm -rf ./*.snap

execute: |
  mkdir test-snap
  cd test-snap
  snapcraft init
  snapcraft init --profile=test

  rm -f ./*.snap
  snapcraft pack | MATCH "Packing"

  snapcraft test | MATCH "Skipping pack"

  rm -f ./*.snap

  snapcraft test | MATCH "Packing"

  snapcraft pack | MATCH "Skipping pack"

  echo "  new-part:\n    plugin: nil" >> snap/snapcraft.yaml

  snapcraft pack | MATCH "Packing"
